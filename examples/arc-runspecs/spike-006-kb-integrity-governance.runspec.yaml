apiVersion: arc/v1alpha1
kind: CouncilRunSpec

# OQ-8 fixture: routes SPIKE-006's RQ1 threat-model statement and RQ6
# NO-GO-on-cryptographic-signing recommendation through `council-review`, as the
# SPIKE charter's own Method step 4 and Overall-exit-criterion (2) require.
#
# Prerequisite (once per machine, human-approved):
#   arc roots add pediatric-anemia-site <path-to-this-repository-checkout>

council: pediatric-anemia-clinical-review-council

target: repo:pediatric-anemia-site/docs/project_plans/SPIKEs/spike-006-kb-signing-key-custody-verification.md
target_artifact_class: repository_artifact
target_sha256: 5bac138832de7e0abdb0f44b734923955eb1b2d51583ed6280f64e9a41d3f1f6

objective: >-
  Adversarially review SPIKE-006's RQ1 threat-model statement and its RQ6
  NO-GO-on-cryptographic-signing recommendation as a clinical-governance and
  integrity question rather than a cryptography question: does deferring signing
  in favour of a content hash plus manifest supersedes chain leave a pediatric
  clinical decision-support knowledge base with an integrity story adequate to
  its actual risk, given a static browser-local deployment with no server-side
  secret at verification time, ARCH section 10's fail-closed requirement, and the
  DEF-1 dual-evidence-copy sequencing dependency.

constraints:
  - read_only
  - decision_support_only
  - no_patient_specific_advice
  - no_diagnosis_treatment_dosing_or_transfusion
  - no_phi_or_copyrighted_full_text
  - metadata_only_evidence
  - credentialed_clinician_approval_required

evidence_source_manifest: knowledge-packs/pediatric-anemia/source-manifest.yaml
evidence_source_manifest_sha256: f4c33c82fe4977a7d4db2633ab04d82b39bb7bf421d048aba5a5b37a51b711f6

parameters:
  non_patient_artifact_confirmed: true
  target_artifact_class: repository_artifact

slug: spike-006-kb-integrity-governance

notes: >-
  Raw YAML is authoritative. target_sha256 binds the SPIKE as it stood at commit e69d307, BEFORE the
  OQ-8 resolution this run produced was written back into it. That is deliberate: the digest records
  what was actually reviewed. Any re-review of the amended document needs a new spec and a new digest. The target is a committed, non-patient repository
  planning document. This council is synthetic adversarial review infrastructure:
  it produces findings, disputes, and validation work. It does not and cannot
  produce clinical validation, credentialed clinical sign-off, or release
  authorization. Nothing emitted by this run may populate module.json's
  approvedBy[] or any clinicalApprovers[] field.
