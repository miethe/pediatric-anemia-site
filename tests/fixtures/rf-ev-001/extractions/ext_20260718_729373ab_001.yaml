  notes: ''
- evidence_id: ev_005
  text: Multilineage cytopenia — pancytopenia with relative reticulocytopenia, teardrop RBCs, giant platelets,
    and immature leukocytes — signals marrow replacement, backing the KB's multi-lineage-cytopenia escalation.
  locator: Section 'BM replacement syndromes'
