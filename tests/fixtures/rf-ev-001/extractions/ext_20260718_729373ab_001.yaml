  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Reticulocyte count direction (elevated vs low relative to anemia severity) distinguishes an adequate
    erythropoietic response to blood loss/hemolysis from inadequate marrow production.
  locator: Section 'Laboratory investigation'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
