  text: A normal quantitative G6PD assay drawn during or soon after a haemolytic episode can be false-normal
    (young red cells/reticulocytes carry higher activity), so the CDS must not exclude G6PD deficiency
    on such a result and should flag re-assay at least 2-3 months after the episode resolves when suspicion
    persists.
