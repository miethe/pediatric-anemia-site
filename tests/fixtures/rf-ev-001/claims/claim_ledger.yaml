- claim_id: clm_inf01
  text: WHO's 6-23 mo anaemia cutoff of <105 g/L (=<10.5 g/dL) sits BELOW the AAP Table 1 normal-Hb lower
    bound of 11.0 g/dL for age 6-24 mo, so a Hb of 10.5-11.0 g/dL reads 'below AAP normal interval' yet
    'not anaemic' by WHO -- two different constructs (WHO 5th-percentile anaemia cutoff vs AAP reference
    interval) that must be preserved, not conflated or averaged.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_030
    reasoning_summary: clm_001 gives WHO 6-23 mo <105 g/L (10.5 g/dL after the /10 g/L->g/dL conversion
      the WHO card leaves to the converter); clm_030 gives AAP 6-24 mo normal Hb interval 11.0-13.5 g/dL.
      The WHO anaemia cutoff lies below the AAP normal-interval floor, creating a 10.5-11.0 g/dL discordance
      zone; the two are distinct statistical constructs and the CDS must not merge them.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: AAP 2026 ferritin ID thresholds (<=20 ng/mL young/school-aged children; <=30 ng/mL adolescents
    and all menstruating individuals) are markedly higher than the WHO <12/<15 ng/mL provenance cited
    within the same AAP source, an unresolved cross-standard ferritin conflict the CDS must carry as two
    named provenances rather than reconcile.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_031
    reasoning_summary: clm_031 asserts the AAP <=20/<=30 ng/mL thresholds; the src_00 card (ev_003 + Limitations)
      records that AAP aligns with ASH and diverges from WHO 2020 <12/<15 ng/mL. Divergent provenances
      for the same analyte must be preserved as a conflict, not averaged, per the preserve-conflicts directive.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: The AAP ferritin ID cutoffs (<=20 / <=30 ng/mL) are uninterpretable when CRP is elevated because
    serum ferritin is an acute-phase reactant; in that setting the sTfR-ferritin index (>2 = iron deficiency;
    <1 = anaemia of chronic inflammation) should replace ferritin as the ID discriminator.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_031
    - clm_032
    - clm_033
    reasoning_summary: clm_032 states an elevated CRP renders SF unreliable (may be falsely normalized);
      clm_031 supplies the ferritin cutoffs that thereby become invalid; clm_033 supplies the inflammation-robust
      sTfR/log10-ferritin index (>2 / <1) as the substitute discriminator. The chain yields an explicit
      inflammation gate on ferritin interpretation.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: 'Inflammation logic must be applied asymmetrically across analytes: WHO directs that haemoglobin
    NOT be adjusted for infection/inflammation, whereas AAP treats serum ferritin as inflammation-confounded
    -- so the CDS should inflammation-gate iron-store markers (ferritin) but leave the Hb anaemia cutoff
    unadjusted.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_005
    - clm_032
    reasoning_summary: 'clm_005 = WHO: do not adjust Hb for infection/inflammation; clm_032 = AAP: ferritin
      is unreliable when CRP elevated. The two together prescribe different handling of Hb vs ferritin
      under inflammation, an asymmetry the converter must encode.'
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: The BSH adult G6PD reference values (8.7+/-1.7 iu/g Hb at 30 C; 12.1+/-2.09 iu/g Hb at 37 C uncorrected)
