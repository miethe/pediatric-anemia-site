- claim_id: clm_spec01
  text: 'Implementation boundary: under FDA Criteria 3-4 the pediatric anemia CDS must present non-specific,
    independently-reviewable recommendations with a stated intended use and must NOT emit a specific preventive/diagnostic/treatment
    directive or serve a critical/time-sensitive decision, or it risks meeting the device definition --
    so every located threshold ships as a reviewable proposal, not an auto-directive.'
  materiality: material
  claim_type: recommendation
  status: speculation
  confidence: high
  sources: []
  inference_basis:
