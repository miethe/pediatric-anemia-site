    reasoning_summary: Forward-looking design boundary derived from clm_024 (all four 520(o)(1)(E) criteria
      required), clm_026 (a specific directive fails Criterion 3), clm_025 and clm_027 (Criterion 4 =
      enable independent review; time-critical tasks do not qualify). This constrains how the CDS surfaces
      the thresholds; it is an implementation proposal, not a source-stated clinical fact.
  report_locations: []
  reviewer_notes: ''
