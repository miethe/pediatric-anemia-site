contradictions_or_cautions:
- text: Cut points derived by CART recursive partitioning on one cohort (development/testing split); not
    externally validated as a clinical rule.
  locator: card/trust
- text: Restricted to 24-26 weeks gestation (excludes 22-23 and 27 weeks); limited generalizability.
  locator: card/trust
- text: Cognitive-impairment outcome (BSID-III CCS <85) not a universally accepted definition; may exclude
    severe global impairment.
  locator: card/trust
- text: No data on maternal-milk exposure.
  locator: card/trust
