extracted_facts:
- evidence_id: ev_001
  text: CDC recommends switching from the WHO Growth Standards to the CDC 2000 Growth Reference at age
    2 years, the transition point the study addresses.
  locator: Abstract — Background (first sentence)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: The study defines a large change in z-score as a value less than -1 (drop) or greater than +1
    (rise).
  locator: Abstract — Methods (final sentence)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The gradual charts transition between WHO and CDC using a weighted average applied across ages
    2 to 5 years.
  locator: Abstract — Results (first sentence)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: In 7429 children, the abrupt CDC-recommended switch produced a large mean z-score decrease between
    1.5 and 2 years (BMIz -0.59, WTz -0.35) that was nearly absent with the gradual charts (BMIz -0.09,
    WTz -0.01).
  locator: Abstract — Results (second sentence)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The proportion of children with a large drop in z-score was much higher with the CDC-recommended
    charts (BMIz 28.3%, WTz 6.0%) than the gradual charts (BMIz 11.6%, WTz 0.85%).
  locator: Abstract — Results (third sentence)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors conclude the gradual-transition charts may reduce overidentification of slow weight
    gain and may be useful in clinical care and research.
  locator: Abstract — Conclusions
  confidence: medium
  quote_available: true
  notes: ''
