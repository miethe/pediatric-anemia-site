extracted_facts:
- evidence_id: ev_001
  text: The consensus statement defines a standardized indicator set to diagnose/document undernutrition
    in the pediatric population aged 1 month to 18 years.
  locator: Abstract, purpose sentence (Nutr Clin Pract 2015;30(1):147-61)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: With a single data point, the recommended indicators are z-scores for weight-for-height/length,
    BMI-for-age, or length/height-for-age, or mid-upper arm circumference.
  locator: Abstract, recommended-indicators sentence (single data point)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: With 2+ data points the indicators add weight gain velocity (age <2 years), weight loss (age 2-20
    years), deceleration in weight-for-length/height z-score, and inadequate nutrient intake.
  locator: Abstract, recommended-indicators sentence (2+ data points)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The indicators are intended for use across acute, ambulatory/outpatient, and residential care
    settings.
  locator: Abstract, settings sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The statement is a diagnosis/documentation tool, not a nutritional-risk screening tool; deriving
    screening criteria is explicitly out of scope.
  locator: Abstract, scope-exclusion sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Clinicians should use as many available data points as possible to identify and document malnutrition.
  locator: Abstract, clinician-guidance sentence
  confidence: medium
  quote_available: true
  notes: ''
