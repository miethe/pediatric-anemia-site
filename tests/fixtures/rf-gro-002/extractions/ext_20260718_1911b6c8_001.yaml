extracted_facts:
- evidence_id: ev_001
  text: For a single available data point, the recommended pediatric undernutrition indicators are z-scores
    for weight-for-height/length, BMI-for-age, length/height-for-age, or mid-upper arm circumference (MUAC).
  locator: Abstract (author summary), recommended-indicators sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: When 2 or more data points are available, indicators additionally include weight-gain velocity
    (applies age <2 years), weight loss (applies age 2-20 years), deceleration in weight-for-length/height
    z-score, and inadequate nutrient intake.
  locator: Abstract (author summary), two-or-more-data-points sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The indicator set is intended to diagnose and document undernutrition across the pediatric population
    ages 1 month to 18 years.
  locator: Abstract (author summary), purpose/scope sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The indicators are intended for use across multiple care settings — acute, ambulatory/outpatient,
    and residential care.
  locator: Abstract (author summary), settings sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The statement defines diagnostic/documentation indicators, not nutritional-risk screening criteria;
    screening is explicitly out of scope.
  locator: Abstract (author summary), scope-exclusion sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Clinicians are directed to use as many data points as are available when identifying and documenting
    malnutrition (favoring multi-datapoint over single-datapoint indicators where possible).
  locator: Abstract (author summary), clinician-guidance sentence
  confidence: medium
  quote_available: true
  notes: ''
