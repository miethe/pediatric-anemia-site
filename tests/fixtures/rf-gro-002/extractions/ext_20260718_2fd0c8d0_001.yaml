- evidence_id: ev_001
  text: The WHO weight-for-length indicator is the standard applied from birth to 2 years of age.
  locator: 'Download section labels — ''Weight-for-length: Birth to 2 years'' subsections (Charts / Tables)'
  confidence: medium
