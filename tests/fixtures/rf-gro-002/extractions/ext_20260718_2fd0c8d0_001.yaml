- evidence_id: ev_002
  text: The WHO weight-for-height indicator is the standard applied from 2 to 5 years of age.
  locator: 'Download section labels — ''Weight-for-height: 2 to 5 years'' subsections (Charts / Tables)'
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The combined weight-for-length/height standard spans birth to 5 years, joining the length-based
    (birth-2y) and height-based (2-5y) segments.
  locator: Download section labels — combined 'Birth to 5 years' weight-for-length/height subsections
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The standard is published in both z-score and percentile form, provided separately for girls and
    boys.
  locator: 'Charts and Tables sections — ''z-scores: girls'', ''Percentiles: girls'', ''z-scores: boys'',
    ''Percentiles: boys'''
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: WHO distributes the standard in multiple derived formats (charts, full tables, simplified field
    tables, and expanded national-health-card tables), each split by sex and z-score vs percentile.
  locator: Resource-category headings — 'Charts', 'Tables', 'Simplified field tables', 'Expanded tables
    for constructing national health cards'
  confidence: medium
