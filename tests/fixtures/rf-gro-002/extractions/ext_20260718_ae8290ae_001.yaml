contradictions_or_cautions:
- text: Thresholds are chart-relative (UK-WHO centile spaces / centile lines), not standalone anthropometric
    cutoffs; correct chart and correctly plotted measurements are prerequisites.
  locator: card/trust
- text: '''Centile space'' semantics depend on the specific UK-WHO chart used; applying the rule requires
    the chart''s centile-line spacing.'
  locator: card/trust
- text: Guideline scope is UK practice; centile conventions (2nd, 0.4th, 9th, 91st centiles) follow UK-WHO
    chart lines and may differ from CDC/WHO percentile conventions used elsewhere.
  locator: card/trust
