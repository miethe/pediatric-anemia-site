extracted_facts:
- evidence_id: ev_001
  text: Growth faltering (GF) is defined longitudinally as a weight-for-age z-score fall of at least 1.0
    SD from birth to discharge, per applied ESPGHAN criteria.
  locator: Section 2 (Materials and Methods), 'At discharge' classification paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Undernutrition (UN) is defined cross-sectionally as a weight-for-age OR length-for-age z-score
    below −2 SD at discharge, per applied ESPGHAN criteria.
  locator: Section 2 (Materials and Methods), 'At discharge' classification paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: ESPGHAN flags infants whose weight or length z-score drops exceed 2 SD as requiring attention
    and tailored nutritional support.
  locator: Section 1 (Introduction), paragraph 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Small for gestational age (SGA) is defined at birth as a birth-weight centile below the 3rd percentile.
  locator: Section 2 (Materials and Methods), 'At birth' classification paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Growth restriction (GR) at birth is defined by BW <3rd centile or <−2 SD, OR by at least three
    of five listed criteria (BW <10th, HC <10th, length <10th, prenatal IUGR diagnosis, or maternal hypertension/preeclampsia).
  locator: Section 2 (Materials and Methods), 'At birth' classification paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: In this cohort of 402 very preterm infants with available data, GF occurred in 45.3% and UN in
    33.1% at discharge — cohort prevalence, not a decision threshold.
  locator: Section 3 (Results), opening paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: All growth z-scores and centiles in this study are computed against INTERGROWTH-21st prescriptive
    standards, making every threshold reference-chart dependent.
  locator: Section 4 (Discussion), growth-curve paragraph
  confidence: medium
  quote_available: true
  notes: ''
