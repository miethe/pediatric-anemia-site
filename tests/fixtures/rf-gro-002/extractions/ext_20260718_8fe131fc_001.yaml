contradictions_or_cautions:
- text: Single level-IV NICU (Bologna, Italy), 2013-2019 cohort — prevalence figures are cohort-specific,
    not reference-interval norms
  locator: card/trust
- text: Definitions are quoted as applied ESPGHAN criteria; the primary ESPGHAN position paper is the
    upstream authority for the thresholds
  locator: card/trust
- text: Retrospective design; ~3% missingness; small growth-restriction subgroup precluded some multivariate
    analysis
  locator: card/trust
