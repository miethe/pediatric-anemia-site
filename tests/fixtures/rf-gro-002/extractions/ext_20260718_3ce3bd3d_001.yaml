contradictions_or_cautions:
- text: Reference derived from 1977 NCHS/WHO US sample merged with the 0-5y standards sample, not a fresh
    multi-country prescriptive sample like the 0-5y standards
  locator: card/trust
- text: Cutoffs are population/statistical (SD-score anchored to adult BMI cutoffs), not assay-based
  locator: card/trust
