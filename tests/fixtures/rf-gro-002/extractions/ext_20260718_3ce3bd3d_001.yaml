extracted_facts:
- evidence_id: ev_001
  text: At 19 years the WHO 2007 BMI-for-age +1 SD value is 25.4 kg/m2 for boys and 25.0 kg/m2 for girls,
    set equivalent to the adult overweight cutoff of >=25.0 kg/m2.
  locator: Abstract (Findings); repeated in Results and Discussion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: At 19 years the WHO 2007 BMI-for-age +2 SD value is 29.7 kg/m2 for both sexes, aligned with the
    adult obesity cutoff of >=30.0 kg/m2.
  locator: Abstract (Findings); repeated verbatim in Discussion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The BMI-for-age transition between the 0-5y standards and the 5-19y reference at age 5 is smooth,
    with differences across all centiles mostly 0.0-0.1 kg/m2 and never more than 0.2 kg/m2.
  locator: Results (transition at 5 years); Abstract (Findings)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Weight-for-age is not extended across the full 5-19y range because it cannot distinguish height
    from body mass beyond childhood; the weight-for-age charts extend only to 10 years.
  locator: Discussion (weight-for-age scope)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The WHO 2007 height-for-age and BMI-for-age charts extend to 19 years, the WHO-defined upper limit
    of adolescence, giving a reference for the 5-19y age group.
  locator: Discussion (upper age limit); Abstract (Conclusion)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The WHO 2007 reference curves were constructed with the Box-Cox power exponential (BCPE) method
    with cubic-spline smoothing, the same approach used for the 0-5y WHO Child Growth Standards.
  locator: Methods (statistical method)
  confidence: medium
  quote_available: true
  notes: ''
