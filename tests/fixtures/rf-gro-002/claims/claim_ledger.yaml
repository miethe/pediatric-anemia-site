- claim_id: clm_inf06
  text: Monitoring cadence is itself age-staged - weekly for infants 1-6 months and every other week for
    infants 6-12 months - so the rate at which serial data points accrue (and therefore when the multi-datapoint
    longitudinal indicators become computable) is age-dependent, not uniform.
