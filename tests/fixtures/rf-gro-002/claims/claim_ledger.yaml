- claim_id: clm_inf05
  text: 'The consensus (ASPEN-type) indicator set is itself an adaptive staged-testing logic: with a single
    data point only cross-sectional indicators apply (weight-for-height/length, BMI-for-age, length/height-for-age
    z-scores, or MUAC), and with two or more data points longitudinal indicators unlock (weight-gain velocity
    for age <2y, weight loss for age 2-20y, weight-for-length/height deceleration, inadequate intake),
    with clinicians directed to use as many data points as available.'
  materiality: material
  claim_type: factual
  status: inference
  confidence: high
  sources: []
  inference_basis:
