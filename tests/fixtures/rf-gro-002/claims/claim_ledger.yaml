- claim_id: clm_inf01
  text: The 1.0 z-score-fall faltering trigger is corroborated across three independent standards (Cooke
    expert opinion, UK NICE 2021, applied ESPGHAN preterm criteria) but they disagree on the anthropometric
    base - weight-for-age vs weight-for-height - so the magnitude is convergent while the indicator remains
    an unresolved conflict.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_002
    - clm_004
    - clm_052
    reasoning_summary: clm_001/clm_004/clm_052 all set the faltering trigger at a >=1.0 z-score weight-for-AGE
      fall, while clm_002 (same review's abstract) frames the same 1-z-score trigger on weight-for-HEIGHT;
      the numeric magnitude agrees across sources but the base indicator does not.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: 'The evidence base supports two parallel and categorically distinct faltering axes: a STATIC severity
    cutoff at z < -2 shared by WHO undernutrition and applied-ESPGHAN undernutrition, versus a DYNAMIC
    longitudinal deceleration trigger at a >=1.0 z-score fall - they are not one threshold and must not
    be collapsed.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_003
    - clm_053
    - clm_001
    reasoning_summary: clm_003 (WHO) and clm_053 (ESPGHAN UN at discharge) both use a static z < -2 cross-sectional
      cutoff, whereas clm_001 defines faltering by a longitudinal >=1.0 z-score fall over time; these
      are different measurement axes (level vs change) that a CDS must keep separate.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'Every numeric z-score/percentile threshold in this evidence base is growth-standard-dependent
    and non-transferable: the same preterm infants are classified growth-failed 57% on Fenton vs 32% on
    INTERGROWTH-21st, and WHO-vs-CDC choice shifts low-weight-for-age prevalence at 6-23 months from <3%
    to 7-11% - so chart identity must be bound to every threshold.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_022
    - clm_050
    - clm_051
    - clm_058
    reasoning_summary: clm_022 shows 57% (Fenton) vs 32% (INTERGROWTH) growth-failure prevalence in the
      same cohort; clm_050/clm_051 show WHO vs CDC percentile choice changes low-weight flagging (<3%
      vs 7-11%, and 10% mislabel if mixed); clm_058 states all study thresholds are INTERGROWTH-computed
      - together the numeric cutoff is meaningless without its chart.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: The 24-month boundary is a triple discontinuity - chart source (WHO to CDC), measurement method
    (recumbent length to standing height at 730/731 days), and indicator (weight-for-length to weight-for-height)
    - and the abrupt chart switch alone raises the proportion flagged with a large BMIz drop from 11.6%
    to 28.3%, so a flat z-score-drop rule applied across 24 months over-identifies faltering.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_046
    - clm_063
    - clm_074
    - clm_024
    reasoning_summary: clm_046/clm_059 place the WHO->CDC chart switch at 24 months; clm_074 places the
      length->height computational switch at 730/731 days; clm_024/clm_023 place the weight-for-length->weight-for-height
