- claim_id: clm_inf07
  text: UK NICE NG75 makes the faltering threshold a function of birthweight centile band (a fall of 1
    space if BW <9th centile, 2 spaces if 9th-91st, 3 spaces if >91st), an explicit regression-to-the-mean
    adjustment absent from the flat >=1.0 z-score-fall rules - so the two threshold designs are structurally
    different, not interchangeable.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_066
    - clm_067
    - clm_068
    - clm_004
    reasoning_summary: clm_066/clm_067/clm_068 grade the centile-space-fall trigger by birthweight band,
      whereas clm_004's alternative (and clm_001/clm_052) use a single flat >=1.0 z-score fall independent
      of birthweight; NICE conditions on birthweight to allow larger falls for high-BW infants, a different
      design premise.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf08
  text: Applying NICE's own conversion of 1 centile space = 0.67 z-score, a 2-centile-space fall equals
    ~1.34 z-score and a 3-space fall ~2.01 z-score - so NICE's 2- and 3-space triggers are more conservative
    (require a larger drop) than the flat >=1.0 z-score-fall trigger, and thresholds stated in the two
    units are not equal.
  materiality: material
  claim_type: quantitative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_004
    - clm_070
