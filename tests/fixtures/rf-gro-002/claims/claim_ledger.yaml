    - clm_014
    reasoning_summary: clm_009/clm_029 enumerate the single-datapoint indicator set; clm_010/clm_030 add
      the multi-datapoint longitudinal indicators; clm_014/clm_033 direct clinicians to favor multi-datapoint
      evidence - i.e. the indicator set is staged by data availability, which is exactly the 'adaptive
