    - clm_001
    reasoning_summary: clm_004/clm_070 give 1 centile space = 0.67 z-score; multiplying, a 2-space fall
      (clm_067) = 1.34 z and a 3-space fall (clm_068) = 2.01 z, both exceeding the >=1.0 z flat trigger
      (clm_001) - a direct arithmetic comparison showing the centile-space rules demand a larger deceleration.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: The evidence supports a distinct preterm/VLBW branch - z-scores on a preterm-specific prescriptive
