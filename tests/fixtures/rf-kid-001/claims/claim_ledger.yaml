- claim_id: clm_inf01
  text: 'KDIGO 2024''s pediatric eGFRcr <90 mL/min/1.73 m2 ''low'' flag (children >2 y) and the <60 mL/min/1.73
    m2 ''depressed GFR'' referral/CKD-staging threshold are two distinct cutoffs that must coexist in
    the module, not be reconciled: <90 is a screening flag, <60 (for >3 months) is the CKD G3+/referral
    threshold.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_009
    - clm_006
    - clm_010
    reasoning_summary: clm_009 sets the >2 y screening flag at <90; clm_006 sets referral/depressed-GFR
      at <60 for >3 months; clm_010 shows <60 (G3a boundary) is population-general staging, so the two
      thresholds serve different functions and both must be encoded.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: 'Nephrotic-range proteinuria has a source conflict in spot-ratio units: pediatric sources define
    it at spot U p/c >2 mg/mg (clm_004, clm_029) while the general/adult narrative review states >350
    mg/mmol = 3.5 mg/mg (clm_015); since 2 mg/mg approximately equals 226 mg/mmol, the pediatric cutoff
    is materially LOWER than 350 mg/mmol — preserve as an unresolved population/units conflict, do not
    average.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_004
    - clm_029
    - clm_015
    reasoning_summary: clm_004 and clm_029 (pediatric) both give nephrotic spot U p/c >2 mg/mg; clm_015
      (general review) gives >350 mg/mmol (3.5 mg/mg); unit conversion (1 mg/mg = 113 mg/mmol for protein)
      shows 2 mg/mg = 226 mg/mmol < 350 mg/mmol, a genuine discordance, not a rounding artifact.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: The proteinuria-detection spot cutoff converges across sources at U p/c >0.2 mg/mg (= 20 mg/mmol)
    for children >2 y (clm_002, clm_014, clm_028), but is age-band-relaxed to <0.5 mg/mg normal for infants
    6-24 months and up to 300 mg/m2/day for neonates/infants (clm_002, clm_028) — the module must branch
    the proteinuria threshold on age band.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_002
    - clm_014
    - clm_028
    reasoning_summary: clm_014 (adult review, 20 mg/mmol) and clm_028/clm_002 (pediatric, 0.2 mg/mg spot;
      0.5 mg/mg for 6-24 mo) agree on the >2 y cutoff and jointly establish the infant relaxation, so
      a single flat 0.2 threshold would over-flag infants.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: The CKiD U25 K constants (creatinine 41.8 M / 37.6 F; cystatin C 81.9 M / 74.9 F, plus the age-dependent
    tables) are valid ONLY for IDMS-standardized enzymatic serum creatinine (mg/dL) and IFCC-standardized
    cystatin C (mg/L) with height in METERS; applying them to Jaffe/non-standardized assays, differently
    calibrated cystatin C, or height in cm invalidates the estimate.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_052
    - clm_054
    - clm_056
    - clm_013
    - clm_044
    reasoning_summary: clm_056 states the U25 constants are assay-specific (enzymatic IDMS creatinine,
      IFCC cystatin C); clm_013 is KDIGO's independent creatinine-assay-dependence warning; clm_044 shows
      a real recalibration (Gentian CysC / 1.17) required for a pre-IFCC equation; source src_00 specifies
      height in meters, whereas Bedside Schwartz (clm_043) uses height in cm — a concrete unit hazard
      for the converter.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: 'Creatinine-only, cystatin-C-only, and combined U25 eGFR are not interchangeable: a creatinine-vs-cystatin
    discordance of >=15 mL/min/1.73 m2 is clinically meaningful (clm_058) and its direction dictates which
    formula is closest to measured GFR (clm_060); cystatin-C and combined forms consistently outperform
    creatinine-only across cohorts (clm_021, clm_039, clm_065, clm_068, clm_071) — the CDS must record
    which method produced any eGFR value.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_058
    - clm_060
    - clm_021
    - clm_039
    - clm_068
    - clm_071
