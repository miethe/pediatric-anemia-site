extracted_facts:
- evidence_id: ev_001
  text: A spot urine P/C ratio above 20 mg/mmol (0.2 mg/mg) is the most commonly reported cutoff for detecting
    proteinuria.
  locator: Abstract (structured summary), results sentence 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: A spot urine P/C ratio above 350 mg/mmol (3.5 mg/mg) confirms nephrotic-range proteinuria.
  locator: Abstract (structured summary), results sentence 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The ISSHP recommends a P/C ratio of 30 mg/mmol (0.3 mg/mg) to classify proteinuria in pregnant
    women at risk of preeclampsia.
  locator: Abstract (structured summary), results sentence 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The P/C ratio cutoff should be established per laboratory because it depends on the patient population
    and the laboratory methodologies.
  locator: Abstract (structured summary), closing recommendation
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A high degree of correlation was observed between spot P/C ratio values and protein concentration
    in 24-hour urine collections, supporting P/C as a substitute for 24-h collection.
  locator: Abstract (structured summary), correlation sentence
  confidence: medium
  quote_available: true
  notes: ''
