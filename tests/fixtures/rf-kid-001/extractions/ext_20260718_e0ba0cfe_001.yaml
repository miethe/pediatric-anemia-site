extracted_facts:
- evidence_id: ev_001
  text: In this pediatric/young-adult cohort the average measured GFR (mGFR by Tc-99m DTPA) was 84.1 mL/min/1.73
    m2.
  locator: Abstract — Results sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Non-race-corrected creatinine equations overestimated eGFR in all groups; CKiD U25-creatinine
    had the lowest bias at 22.59 mL/min/1.73 m2.
  locator: Abstract — Results sentence (creatinine equations)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: CKiD U25-CysC and Schwartz CysC gave the best correlation, P30, and lowest bias; CKiD U25-CysC
    = correlation 0.6281, P30 80.7%, bias 3.72 mL/min/1.73 m2, and Schwartz CysC = 0.6372, 77.2%, -4.68
    mL/min/1.73 m2.
  locator: Abstract — Results sentence (cystatin C equations)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: mGFR was measured by intravenous Tc-99m DTPA tracer and retrospectively compared with equation-based
    eGFR in 57 patients aged 6 months to 22 years of different races/ethnicities.
  locator: Abstract — Methods sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The authors conclude that both CKiD U25-CysC and Schwartz CysC estimate mGFR well, with CKiD U25-CysC
    having the overall best performance in this cohort.
  locator: Abstract — Conclusion sentence
  confidence: medium
  quote_available: true
  notes: ''
