extracted_facts:
- evidence_id: ev_001
  text: ROC analysis identified eGFR-equation agreement thresholds vs the CKiD 2012 reference of <70 mL/min/1.73
    m2 for Schwartz-Lyon, U25, and FAS-height, and <60 mL/min/1.73 m2 for Bedside Schwartz, beyond which
    bias increased.
  locator: Results — 'Formula performance ...' section (also Abstract/Results and Conclusions); Bland-Altman
    / ROC paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Among plasma-creatinine-only equations, Schwartz-Lyon had the highest agreement with the CKiD
    2012 reference (ICC 0.913, CCC 0.911, TDI 14.0 mL/min/1.73 m2, P30 99.2%).
  locator: Results — 'Formula performance of 12 PCr-based eGFR equations...' paragraph; also Abstract
    Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The U25 combined PCr-CystC equation showed excellent agreement with the CKiD 2012 combined reference
    (ICC 0.993, CCC 0.990, TDI 3.9 mL/min/1.73 m2, P30 100%), and is preferred where cystatin C is feasible.
  locator: Results — 'Correlation between the CKiD 2012 and U25 combined PCr-CysC equations' paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The plasma-creatinine-only U25 equation achieved ICC 0.922, CCC 0.882, TDI 20.0 mL/min/1.73 m2,
    and P30 93.3% against the CKiD 2012 combined reference.
  locator: Results — 'Formula performance...' paragraph and Abstract Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Plasma creatinine was measured by an enzymatic method and cystatin C by a particle-enhanced immunoturbidimetric
    assay, applied throughout the study — a documented assay-method dependence for any derived threshold.
  locator: Methods — 'Measurement of Pcr and CystC' paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The study cohort comprised 120 eGFR measurements from 23 pediatric kidney transplant recipients
    (mean age 14.2 +/- 3.4 years) who received adult-donor kidneys (donor mean age 31.7 +/- 10.0 years).
  locator: Results — 'Demographic and clinical characteristics' paragraph; also Abstract Results
  confidence: medium
  quote_available: true
  notes: ''
