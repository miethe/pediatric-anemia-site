- text: Small cohort (n=23 patients, 120 samples), single center
  locator: card/trust
- text: No measured-GFR gold standard — comparisons are equation-vs-equation
  locator: card/trust
- text: Thai cohort with common post-transplant growth retardation may not generalize
  locator: card/trust
- text: Reference CKiD 2012 equation derived in CKD stage >=3 children, may not reflect near-normal-GFR
    transplant recipients
  locator: card/trust
