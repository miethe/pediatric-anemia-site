extracted_facts:
- evidence_id: ev_001
  text: Proteinuria in children can be glomerular and/or tubular in origin and is temporally categorized
    as transient, orthostatic, or persistent.
  locator: Abstract (published abstract, PubMed/ScienceDirect)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Persistent proteinuria may indicate serious underlying kidney pathology and warrants further evaluation.
  locator: Abstract (published abstract, PubMed/ScienceDirect)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Hematuria is defined as an increased number of red blood cells in the urine and may be gross or
    microscopic.
  locator: Abstract (published abstract, PubMed/ScienceDirect)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Hematuria in children can originate from the glomeruli or from other sites in the urinary tract.
  locator: Abstract (published abstract, PubMed/ScienceDirect)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Asymptomatic isolated microscopic hematuria or mild proteinuria in an otherwise healthy child
    is less likely to be clinically significant.
  locator: Abstract (published abstract, PubMed/ScienceDirect)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The co-occurrence of both hematuria and proteinuria requires further workup and careful monitoring.
  locator: Abstract (published abstract, PubMed/ScienceDirect)
  confidence: medium
  quote_available: true
  notes: ''
