- text: Static adolescent cut points (>=13y) adopt adult 2017 ACC/AHA thresholds; not derived from pediatric
    outcome data (subcommittee retained a statistical, not outcome-based, definition).
  locator: card/trust
- text: Normative percentile tables derived from auscultatory data; oscillometric/ABPM devices may yield
    different values.
