extracted_facts:
- evidence_id: ev_001
  text: The consensus sets the acceptable haemoglobin target for DBA syndrome patients of all ages at
    >=9-10 g/dL, individualized to keep the patient asymptomatic.
  locator: Section 9 THERAPY RECOMMENDATIONS, opening paragraph (primary goal)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Erythrocyte adenosine deaminase (eADA) activity helps differentiate DBA syndrome from other anaemias/IBMFS
    with 84% sensitivity and 95% specificity, but must be measured pre-transfusion and a normal value
    does not rule out DBA.
  locator: Section 8 DIFFERENTIAL DIAGNOSES (eADA test performance)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: The target liver iron concentration (LIC), measured by MRI T2*/R2 (FerriScan), for transfusion-dependent
    DBA syndrome patients is as close to normal as possible, i.e., lower than 3 mg Fe/g dry weight.
  locator: Section 9 > Chelation therapy > Evaluation of iron overload (LIC target)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Cardiac iron by MRI T2* should stay as close to normal as possible with an acceptable range of
    20-35 msec; T2* <20 ms associates with decreased cardiac function/worse survival and <10 ms with imminent
    heart-failure risk.
  locator: Section 9 > Chelation therapy > Evaluation of iron overload (cardiac T2*)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Panel lowered the prednisone maintenance ceiling to a maximum of 0.3 mg/kg/day; if Hb >=9 g/dL
    cannot be sustained at <=0.3 mg/kg/day, steroids should be discontinued (some panelists proposed a
    stricter 0.2 mg/kg/day, no consensus).
  locator: Section 9 > Oral steroids (maintenance dose ceiling / discontinuation rule)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Iron chelation is generally initiated after ~10 transfusions or evidence of iron load defined
    as ferritin >500 ng/mL, transferrin saturation >60%, or elevated LIC.
  locator: Section 9 > Chelation therapy > Practical considerations (chelation start triggers)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Classic DBA presents with macrocytic anaemia and reticulocytopenia, with 90% of patients becoming
    symptomatic in the first year of life at a median age of 3 months (though presentation can range from
    in-utero hydrops to the sixth decade).
  locator: Section 4 CLINICAL PRESENTATION (age at presentation)
  confidence: medium
  quote_available: true
  notes: ''
