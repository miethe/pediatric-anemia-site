contradictions_or_cautions:
- text: Scope is ADULT acquired aplastic anaemia; the guideline does not define pediatric age-specific
    CBC reference intervals
  locator: card/trust
- text: Camitta severity cutoffs are fixed absolute-count disease-severity thresholds applied irrespective
    of patient age — they are NOT age/sex-adjusted reference intervals
  locator: card/trust
- text: Paywalled version of record (Wiley); quotes sourced from the accepted-manuscript .docx which may
