extracted_facts:
- evidence_id: ev_001
  text: Study enrollment defined neutropenia for suspected pediatric BMF as an absolute neutrophil count
    below 1.5 x10^9/L.
  locator: Materials and Methods > Patients (para 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Study enrollment defined thrombocytopenia for suspected pediatric BMF as a platelet count below
    150 x10^9/L.
  locator: Materials and Methods > Patients (para 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: In the WES variant-interpretation pipeline, sequence variants with a gnomAD population allele
    frequency above 5% were excluded from further interpretation.
  locator: Materials and Methods > Whole Exome Sequencing (para 1)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: A protocolized in-depth evaluation established a causative diagnosis in 40% (20/50) of pediatric
    BMF patients, 18 of them by genetic analysis (14 mutations, 4 chromosomal deletions).
  locator: Results > (Cyto)Genetic and Functional Analysis (para 1) / Abstract
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The protocol's first diagnostic step is exclusion of malignant and transient/reversible causes
    of BMF — patients are screened for leukemia and referred to a pediatric oncology center if indicated
    — before extended genetic/functional workup begins.
  locator: Materials and Methods > Patients / Figure 1 (Diagnostic Flowchart)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: The authors recommend full genome-wide genetic analysis (WES with CNV plus SNP-array) complemented
    by functional tests in all suspected BMF patients, because causative genetic defects occur even without
    typical syndromic features.
  locator: Conclusion / Abstract > Conclusion
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Median peripheral-blood NK-cell percentage of total lymphocytes was significantly lower in the
    SAA group than in the identified-cause (constitutional) group (3.0 vs 9.0; P<0.05).
  locator: Results > Immunological Screening (para 2)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: The primary WES gene filter (BMF gene panel) contained 172 genes plus HPO-term-driven selection,
    expanded to PID genes / open-WES / Trio-WES when primary analysis was negative.
  locator: Materials and Methods > Whole Exome Sequencing (para 2)
  confidence: medium
  quote_available: true
  notes: ''
