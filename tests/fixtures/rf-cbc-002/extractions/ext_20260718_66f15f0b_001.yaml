extracted_facts:
- evidence_id: ev_001
  text: Mean mitomycin C (MMC)-induced chromosome breaks per cell were far higher in FA patients (6.67
    ±3.92) than in non-FA patients (0.23 ±0.18).
  locator: Abstract (Results summary)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Of 100 children with suspected FA, 13 (13%) had a true FA cellular phenotype, 27 had possible
    mosaic FA, and the remainder were classified non-FA.
  locator: Results section + Patients section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Lymphocyte cultures were incubated for 72 h with MMC at 0, 50, 150, or 300 nM to induce clastogenic
    breakage.
  locator: Materials and methods section
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: The percentage of cells with spontaneous (baseline, non-MMC) chromosome aberrations was more than
    9 times higher in FA than in non-FA patients.
  locator: Abstract (Results summary)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The MMC sensitivity test discriminates FA, possible somatic mosaicism, and non-FA marrow failure
    at the first diagnostic step, but definitive diagnosis still requires follow-up mutation testing and
    fibroblast chromosome breakage analysis.
  locator: Abstract / Conclusions
  confidence: medium
  quote_available: true
  notes: ''
