contradictions_or_cautions:
- text: Single-registry referral cohort (NCI IBMFS) — possible ascertainment/selection bias toward more
    severe disease
  locator: card/trust
- text: Reports epidemiological survival/prevalence outcomes, NOT laboratory assay reference intervals
    or CBC thresholds
  locator: card/trust
- text: Median survival estimates are cohort-level, not individual pediatric decision cutoffs
  locator: card/trust
