- claim_id: clm_inf01
  text: 'Pediatric per-lineage cytopenia cutoffs diverge by source intent and must be preserved as a conflict:
    suspected-pediatric-BMF screening uses neutrophils <1.5x10^9/L and platelets <150x10^9/L (Atmar),
    whereas the BSH acquired-AA diagnostic construct requires >=2 of Hb <100 g/L, platelets <50x10^9/L,
    neutrophils <1.5x10^9/L; the platelet threshold differs 3-fold (150 vs 50 x10^9/L) and reflects screening-vs-diagnosis
    intent, not a reconcilable single value.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_068
    - clm_069
    - clm_061
    reasoning_summary: clm_068/clm_069 give the Atmar pediatric-BMF enrollment cutoffs (ANC <1.5, platelets
      <150 x10^9/L); clm_061 gives the BSH adult AA diagnostic thresholds (platelets <50); the platelet
      numbers differ 3-fold because one screens suspected BMF and the other defines diagnostic AA severity
      — an intent-driven divergence to preserve, not average.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: 'Two independent 2024 guidelines converge on identical modified-Camitta severe-AA scope-exit thresholds:
    both the all-ages Delphi consensus and the BSH guideline state marrow cellularity <25% (or 25-50%
    with <30% residual) plus >=2 of neutrophils <0.5x10^9/L, platelets <20x10^9/L, reticulocytes <60x10^9/L
    for SAA, and neutrophils <0.2x10^9/L for very-severe AA — cross-source agreement raising confidence
    these are the stable multilineage-marrow-failure severity cutoffs.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_055
    - clm_062
    - clm_056
    - clm_063
    reasoning_summary: clm_055 (Delphi src_00) and clm_062 (BSH src_01) state numerically identical Camitta
      SAA criteria; clm_056 and clm_063 state the identical vSAA neutrophils <0.2x10^9/L modifier — independent
      concordance across two guidelines strengthens the thresholds.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: 'The severe-AA reticulocyte criterion (<60x10^9/L) is analyzer-method-dependent: BSH states it
    was modified from a manual percentage to an absolute automated count because automated analyzers over-estimate
    reticulocytes versus manual counts, so a pediatric CDS applying the <60x10^9/L cutoff must confirm
    the value is an automated absolute count and must not apply it to a manual-percentage-derived reticulocyte
    result.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_064
    - clm_062
    reasoning_summary: clm_064 states the Camitta reticulocyte criterion was changed to an absolute <60x10^9/L
      specifically for automated analyzers (which over-estimate vs manual); clm_062 embeds that same automated
      reticulocyte cutoff in the SAA definition — hence the cutoff is method-bound.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf09
  text: 'First-line functional screens for inherited marrow failure are explicitly non-terminal and a
    CBC-triggered referral must route to a confirmatory tier rather than clear on a single negative blood
    assay: the MMC chromosome-breakage FA screen requires follow-up mutation testing plus skin-fibroblast
    breakage analysis to catch somatic-reversion mosaicism, and short-read DNA sequencing missed 2 of
    6 SDS cases recovered only by RNA-seq/proteomics.'
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_029
    - clm_020
    reasoning_summary: clm_029 states the MMC test is a first-step screen and definitive FA diagnosis
      needs mutation + fibroblast testing (mosaicism false-negatives); clm_020 shows DNA-seq alone missed
      2/6 SDS cases — together they establish that a negative first-line blood assay cannot exclude an
      inherited marrow-failure syndrome.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf10
  text: 'A pediatric CBC module carries a higher pre-test probability of an inherited (versus acquired)
    marrow-failure cause than an adult module and should weight IBMFS triggers accordingly: inherited-marrow-failure
    onset clusters in childhood — DC/TBD AR/XLR median diagnosis 11.3 y and TINF2 8.1 y, the IBMFS proteogenomic
    cohort median onset 3 y, and classic DBA 90% symptomatic within the first year of life.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_035
    - clm_021
    - clm_048
    reasoning_summary: clm_035 (DC/TBD AR/XLR 11.3 y, TINF2 8.1 y median dx), clm_021 (IBMFS median onset
      3 y), and clm_048 (DBA 90% symptomatic in first year) all place inherited-syndrome presentation
      in the pediatric band, implying elevated inherited-cause prior probability in a pediatric module.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf11
  text: No source in this run supplies age-, sex-, or gestational/postnatal-age-partitioned pediatric
    reference intervals for defining cytopenia per lineage; every located per-lineage number is an adult
    AA severity cutoff, a study enrollment criterion, or a disease-specific target, so the module's normal/abnormal
    boundaries — especially for neonates and infants — are an explicit evidence GAP that must be filled
    from a dedicated reference-interval source (e.g., CALIPER) before deployment.
  materiality: material
  claim_type: factual
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_061
    - clm_068
    - clm_069
    - clm_003
