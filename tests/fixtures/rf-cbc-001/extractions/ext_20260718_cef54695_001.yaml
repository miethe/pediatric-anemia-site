extracted_facts:
- evidence_id: ev_001
  text: No established consensus guidelines exist for the diagnosis and management of isolated, asymptomatic,
    incidentally discovered pediatric neutropenia.
  locator: Abstract — Background/Introduction sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Most commonly ordered diagnostic tests for this population were CBC (98%), peripheral smear (75%),
    antineutrophil antibody (29%), and immunoglobulins (24%).
  locator: Abstract — Results, tests ordered sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Providers were more likely to order antineutrophil antibody testing in toddlers and ANA panels
    in adolescents, both statistically significant.
  locator: Abstract — Results, age-stratified ordering sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Half of providers did not request additional CBCs before consultation, and most (51%) suggested
    referring mild neutropenia only after confirming a declining ANC rather than on a single value.
  locator: Abstract — Results, referral/CBC sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: The three factors most driving ongoing follow-up were history of recurrent/severe infections (98%),
    family history of blood disorders (98%), and more severe/progressively worsening neutropenia (97%).
  locator: Abstract — Results, follow-up factors sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: 70% of respondents had diagnosed 'benign ethnic neutropenia,' and 75% supported renaming it to
    'typical neutrophil count with Fy(a-/b-) status' confirmed by red-cell phenotyping.
  locator: Abstract — Results, terminology sentence
  confidence: medium
  quote_available: true
  notes: ''
