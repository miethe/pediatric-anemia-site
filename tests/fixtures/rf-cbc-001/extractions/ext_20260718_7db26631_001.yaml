extracted_facts:
- evidence_id: ev_001
  text: 'Neutropenia is defined by age- and race-specific ANC cutoffs: <2500 x10^9/L in neonates/infants,
    <1500 x10^9/L in toddlers/older children/adults, and 1000-1500 x10^9/L lower limit in African American
    children.'
  locator: Section 1 (Introduction), neutropenia-definition paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: By ANC, neutropenia severity is graded mild (1000-1500 x10^9/L), moderate (500-999 x10^9/L), and
    severe (<500 x10^9/L).
  locator: Section 1 (Introduction), severity-classification paragraph
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Cyclic neutropenia typically shows 21-day periodicity with the neutropenic nadir falling below
    200 x10^9/L for 3-5 days, then recovering to about 2000 x10^9/L.
  locator: Section 2.1 (Cyclic Neutropenia)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Severe congenital neutropenia (Kostmann) is characterized by arrested neutrophil maturation at
    the promyelocyte stage with severe neutropenia below 500 x10^9/L.
  locator: Section 2.3 (Kostmann Syndrome / Severe Congenital Neutropenia)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: 'Proposed diagnostic workflow: repeat CBC in 2-4 weeks (no further workup if resolved), and if
    neutropenia persists repeat CBC 2-3 times per week for 6 weeks to differentiate cyclic from severe
    chronic neutropenia.'
  locator: Section 5 (Diagnostic Approach to Neutropenia)
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: More than 24 genes are implicated in congenital neutropenia syndromes, with ~60% of published
    cases attributed to ELANE, and the authors recommend ELANE testing in all unexplained/idiopathic congenital
    cases.
  locator: Section 5 + Section 6 (Conclusions), congenital-neutropenia genetics
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: Infection severity/frequency is inversely correlated with ANC and directly with neutropenia duration,
    and risk is higher when neutropenia results from reduced marrow production rather than peripheral
    destruction.
  locator: Section 1 (Introduction), infection-risk paragraph
  confidence: medium
  quote_available: true
  notes: ''
