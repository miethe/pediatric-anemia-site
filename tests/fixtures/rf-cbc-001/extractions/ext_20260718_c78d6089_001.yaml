extracted_facts:
- evidence_id: ev_001
  text: The study enrolled 687 healthy children and adolescents spanning 30 days to 18 years of age to
    derive pediatric hematology reference intervals.
  locator: Abstract — Methods sentence 1
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: Age- and sex-specific reference intervals were established following the CLSI EP28-A3c guideline.
  locator: Abstract — Methods final sentence
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Age partitioning of reference intervals was required for 52 of the 79 hematology parameters, with
    changes concentrated in infancy and puberty.
  locator: Abstract — Results sentence 2
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Sex partitioning was required for 11 erythrocyte parameters, including RBC, hemoglobin, hematocrit,
    MCV, and MCHC.
  locator: Abstract — Results sentence 3
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: A few parameters had undetectable levels in the healthy cohort, specifically nucleated RBC count
    and immature granulocyte count.
  locator: Abstract — Results sentence 4
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: Whole blood was assayed for 79 hematology parameters on the Mindray BC-6800Plus system, making
    the derived intervals analyzer-specific.
  locator: Abstract — Methods sentence 2 / Title
  confidence: medium
  quote_available: true
  notes: ''
