extracted_facts:
- evidence_id: ev_001
  text: CALIPER hematology reference standards were derived from 566 healthy children and adolescents
    spanning birth to under 21 years.
  locator: Abstract — Methods
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_002
  text: All 47 hematologic parameters were measured on the Beckman Coulter DxH 900, making the reference
    standards analyzer/method-specific.
  locator: Abstract — Methods; Table 1 caption
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_003
  text: Significant age-specific differences were observed for 39 of the 47 hematologic parameters, motivating
    age-partitioned reference intervals.
  locator: Abstract — Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_004
  text: Sex-specific differences were observed for eight hematologic parameters, primarily during and
    after puberty.
  locator: Abstract — Results
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_005
  text: Reference standards were computed per CLSI guidelines, and the study concludes pediatric-specific
    (not adult) reference standards are needed for hematology interpretation.
  locator: Abstract — Methods & Conclusions
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_006
  text: CALIPER age- and sex-partitioned hemoglobin reference intervals (g/L) on the DxH 900, including
    a sex split in the 14-<21 y band.
  locator: Table 1 — Hemoglobin (HGB) row
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_007
  text: CALIPER age-partitioned platelet count reference intervals (10^9/L) on the DxH 900, declining
    from infancy to adolescence.
  locator: Table 1 — Platelet (PLT) row
  confidence: medium
  quote_available: true
  notes: ''
- evidence_id: ev_008
  text: CALIPER age-partitioned white blood cell count reference intervals (10^9/L) on the DxH 900, declining
    across early childhood.
  locator: Table 1 — WBC (leukocyte) count row
  confidence: medium
  quote_available: true
  notes: ''
