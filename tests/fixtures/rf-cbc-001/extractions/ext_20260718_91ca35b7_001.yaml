- evidence_id: ev_005
  text: The authors propose that wider Duffy typing in neutropenia WITHOUT recurrent/frequent/serious
    infections could reduce unnecessary consultations and investigations — framing absence of such infection
    as the discriminator between benign and pathologic neutropenia.
  locator: Abstract (second sentence)
