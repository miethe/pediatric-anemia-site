  reviewer_notes: ''
- claim_id: clm_inf06
  text: Cyclic neutropenia is defined by a temporal pattern (nadir <0.2 x10^9/L at ~21-day periodicity),
    not a single value, so a single low ANC cannot distinguish cyclic from severe chronic neutropenia
    and the module cannot classify etiology from one measurement; serial counts (repeat CBC 2-3x/week
    over 6 weeks) are required to differentiate.
