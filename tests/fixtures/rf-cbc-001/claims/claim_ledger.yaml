- claim_id: clm_inf01
  text: 'The severe-neutropenia boundary is numerically identical across sources despite divergent unit
    rendering: source 09 states severe as ANC <500 (rendered x10^9/L) while sources 08/03 state SCN/Kostmann
    as ANC <0.5 x10^9/L, and 500 cells/uL equals 0.5 x10^9/L, so the CDS converter must normalize unit
    conventions before any threshold comparison.'
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_019
    - clm_033
    - clm_051
    reasoning_summary: clm_019 grades severe as <500 in a units string (x10^9/L) whose magnitude is actually
      cells/uL, while clm_001/clm_033/clm_051 give the identical clinical count as <0.5 x10^9/L; 500/uL
      = 0.5 x10^9/L, so the numbers agree once units are reconciled and a naive numeric compare would
      be off by 1000x.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf02
  text: Neonates/infants carry a higher neutropenia cutoff (ANC <2500, source 09) than toddlers/older
    children (ANC <1500), so applying the older-child 1500 cutoff to a neonate would under-flag; age-partitioned
    ANC cutoffs are required and adult cutoffs must not be reused for young children.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_018
    - clm_009
    - clm_027
    reasoning_summary: clm_018 gives distinct age-band cutoffs (<2500 neonates/infants vs <1500 toddlers/older
      children); clm_009 and clm_027 independently show age-specific reference-interval differences for
      39/47 hematologic parameters, so a single age-agnostic ANC cutoff is unsafe.
  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf03
  text: Four independent sources converge on ANC <0.5 x10^9/L (=<500/uL) as the severe-neutropenia boundary
    (SCN definition, the severe grading band, Kostmann/SCN, and the clinical SCN diagnostic cutoff), giving
    high confidence this is the module's severe-neutropenia red-flag threshold.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_001
    - clm_019
    - clm_021
    - clm_033
    reasoning_summary: clm_001 (SCN <0.5), clm_019 (severe <500), clm_021 (Kostmann <500), and clm_033
      (SCN <0.5 clinically) all mark the same absolute count as the severe boundary across a registry,
