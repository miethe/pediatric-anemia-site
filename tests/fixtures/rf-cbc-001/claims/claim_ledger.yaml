  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf04
  text: Myeloid-malignancy (MDS/AML) risk concentrates in congenital neutropenia (11.3% of SCNIR congenital
    patients; 16% in a second SCNIR cohort) and was never observed in autoimmune/idiopathic neutropenia
    (0 of 816), so a persistent congenital pattern (ANC <0.5 x10^9/L beyond infancy) is a hematology/oncology
    referral trigger whereas the autoimmune/idiopathic pattern carries a favorable myeloid prognosis.
  materiality: material
  claim_type: causal
  status: inference
  confidence: high
  sources: []
  inference_basis:
    from_claims:
    - clm_004
    - clm_005
    - clm_006
    - clm_053
