  report_locations: []
  reviewer_notes: ''
- claim_id: clm_inf05
  text: Duffy-null / benign-ethnic neutropenia is the dominant benign etiology of pediatric neutropenia
    referrals (77.7% overall, up to 96.6% in Yemeni and 91% in African American referrals), and absence
    of recurrent/frequent/serious infection discriminates benign from pathologic, so mild neutropenia
    in an ancestrally-relevant child without infection history has high pretest probability of being benign
    and does not by itself warrant escalation.
  materiality: material
  claim_type: comparative
  status: inference
  confidence: medium
  sources: []
  inference_basis:
    from_claims:
    - clm_039
    - clm_040
    - clm_041
    - clm_043
    - clm_074
