name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# PR verification runs get their own per-PR group so they never queue behind (or block) a
# production Pages deploy. The deploy path keeps the original `pages` group and
# cancel-in-progress: false, so an in-flight publish is never interrupted.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-verify-{0}', github.event.number) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # PR verification gate: mirrors npm run check (test, validate, build, check:imports, smoke)
      - run: npm test
      - run: npm run validate
      - run: npm run build
      - run: npm run check:imports
      - run: npm run smoke

  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The deploy is gated on the engine tests and knowledge-base validation:
      # an unvalidated rule set must never reach the published site.
      - run: npm test
      - run: npm run validate
      - run: npm run build
      - run: npm run check:imports
      - run: npm run smoke

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
